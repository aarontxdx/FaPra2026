<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaflet Map – Beispielstruktur</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  
  <style>
    body {
      margin: 0;
      display: grid;
      grid-template-columns: 300px 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    header {
      grid-column: 1 / 3;
      background: #333;
      color: white;
      padding: 1rem;
    }

    aside {
      background: #f4f4f4;
      padding: 1rem;
      overflow-y: auto;
      border-right: 1px solid #ccc;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    footer {
      grid-column: 1 / 3;
      background: #eee;
      padding: 0.5rem;
      text-align: center;
    }
  </style>
</head>

<body>

  <header>
    <h1>OSM Data Processing</h1>
  </header>

  <aside>
    <h2>Control</h2>

    <section>
      <h3>Filter</h3>
      <label>
        <input type="checkbox" id="showBuildings" >
        Show buildings
      </label><br>
      <label>
        <input type="checkbox" id="showAdminAreas">
        Show Administrtion Areas
      </label>
      <label><br>
        <input type="checkbox" id="showStreets">
        Show streets
      </label><br>
    </section>

    <section>
      <h3>Settings</h3>

      <!-- Building -->
      <label>Building threshold:</label><br>
      <input type="text" id="thresholdInput" placeholder="Building threshold">
      <button onclick="setThreshold(document.getElementById('thresholdInput').value)">
        Set building threshold
      </button>

      <br><br>

      <!-- AdminAreas -->
      <label>Admin threshold:</label><br>
      <input type="text" id="adminThresholdInput" placeholder="Admin area threshold">
      <button onclick="setAdminThreshold(document.getElementById('adminThresholdInput').value)">
        Set admin threshold
      </button>

      <br><br>

      <!-- Roads -->
      <label>Road threshold:</label><br>
      <input type="text" id="roadThresholdInput" placeholder="Road threshold">
      <button onclick="setRoadThreshold(document.getElementById('roadThresholdInput').value)">
        Set admin threshold
      </button>

      <br><br>

      <!-- Optional: Slider behalten -->
      <label for="adminSlider">Admin-Level:</label>
      <input type="range" id="adminSlider" min="0" max="6" step="1" value="0">
      <span id="adminLabel"></span>
    </section>
  </aside>

  <main id="map"></main>

  <footer>
    2026 – Fachpraktikum Aaron Paulus
  </footer>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const map = L.map('map').setView([48.7758, 9.1829], 13);
    var buildingThreshold = 1000;
    var adminThreshold = 10;
    var roadThreshold = 10000

    var currentAdminLevel = 2;

    const buildingLayer = L.layerGroup();
    const adminLayer = L.layerGroup();
    const streetLayer = L.layerGroup();

    const slider = document.getElementById("adminSlider");
    const adminLabel = document.getElementById("adminLabel");
    const buildingCheckBox = document.getElementById("showBuildings");
    const adminAreaCheckBox = document.getElementById("showAdminAreas")
    const streetCheckBox = document.getElementById("showStreets");

    const adminLevels = [
    { level: 2,  name: "Land" },
    { level: 4,  name: "Bundesland" },
    { level: 5,  name: "Regierungsbezirk" },
    { level: 6,  name: "Landkreis / Kreisfreie Stadt" },
    { level: 8,  name: "Gemeinde / Stadt" },
    { level: 9,  name: "Stadtbezirk" },
    { level: 10, name: "Ortsteil / Stadtteil" }
    ];

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
    }).addTo(map);

    buildingCheckBox.addEventListener("change", (e) => {
        if (e.target.checked) {
            map.addLayer(buildingLayer);   // Marker anzeigen
            loadBuildings();
        } else {
            map.removeLayer(buildingLayer);
        }
    });

    adminAreaCheckBox.addEventListener("change", (e) => {
        if (e.target.checked) {
            map.addLayer(adminLayer);   // Marker anzeigen
            loadAdminAreas();
        } else {
            map.removeLayer(adminLayer);
        }
    });

    streetCheckBox.addEventListener("change", (e) => {
        if (e.target.checked) {
            map.addLayer(streetLayer);
            loadStreets();
        } else {
            map.removeLayer(streetLayer);
        }
    });

    slider.addEventListener("input", updateAdminLevel);

    function loadBuildings() {
        buildingLayer.clearLayers();

        const bounds = map.getBounds();

        const minLat = bounds.getSouth();
        const maxLat = bounds.getNorth();
        const minLon = bounds.getWest();
        const maxLon = bounds.getEast();

        fetch(`http://localhost:8080/loadBuildings?threshold=${buildingThreshold}`
            + `&minLat=${minLat}&minLon=${minLon}&maxLat=${maxLat}&maxLon=${maxLon}`)
            .then(res => res.json())
            .then(data => {
                data.forEach(b => {
                    const [lon, lat] = b.centroid;

                    const marker = L.circleMarker([lat, lon], {
                        radius: 4,
                        color: "red",
                        fillColor: "red",
                        fillOpacity: 0.8
                    });

                    marker.bindPopup(`
                        <b>${b.name || "Building"}</b><br>
                        ${b.street || ""} ${b.housenumber || ""}<br>
                        ${b.postcode || ""} ${b.city || ""}<br>
                        ${b.country || ""}
                    `);

                    buildingLayer.addLayer(marker);
                });
            });
    }

    function loadAdminAreas() {

        // Layer leeren (wichtig: Klammern!)
        adminLayer.clearLayers();

        fetch("http://localhost:8080/loadAdminAreas?adminLevel=" + currentAdminLevel 
              + "&threshold=" + adminThreshold)
        .then(res => res.json())
        .then(data => {
            L.geoJSON(data, {
                style: function (feature) {
                    return {
                        color: "blue",
                        weight: 2,
                        fillColor: "lightblue",
                        fillOpacity: 0.3
                    };
                },
                onEachFeature: function (feature, layer) {
                  layer.bindPopup(
                      "Name: " + feature.properties.name + "<br>" +
                      "ID: " + feature.properties.id
                  );
                }
            }).addTo(adminLayer);
        });
    }

    function loadStreets() {
        streetLayer.clearLayers();

        const bounds = map.getBounds();

        const minLat = bounds.getSouth();
        const maxLat = bounds.getNorth();
        const minLon = bounds.getWest();
        const maxLon = bounds.getEast();

        fetch(`http://localhost:8080/loadStreets?threshold=${roadThreshold}`
            + `&minLat=${minLat}&minLon=${minLon}`
            + `&maxLat=${maxLat}&maxLon=${maxLon}`)
            .then(res => res.json())
            .then(data => {

                L.geoJSON(data, {
                    style: function(feature) {
                        switch (feature.properties.type) {
                            case "motorway": return { color: "red", weight: 5 };
                            case "primary": return { color: "orange", weight: 4 };
                            case "secondary": return { color: "yellow", weight: 3 };
                            case "residential": return { color: "gray", weight: 2 };
                            default: return { color: "black", weight: 1 };
                        }
                    },

                    onEachFeature: function(feature, layer) {
                        layer.bindPopup(
                            `<b>${feature.properties.name || "Unknown road"}</b><br>
                            Type: ${feature.properties.type}<br>
                            ID: ${feature.properties.id}`
                        );
                    }

                }).addTo(streetLayer);

            });
    }


    function setThreshold(newThreshold) {
        if (!isNaN(newThreshold) && newThreshold.trim() !== "") {
            buildingThreshold = Number(newThreshold);
            console.log("Threshold:", buildingThreshold);
        } else {
            console.log("Keine gültige Zahl!");
        }
    }

    function setAdminThreshold(newThreshold) {
        if (!isNaN(newThreshold) && newThreshold.trim() !== "") {
            adminThreshold = Number(newThreshold);
            console.log("Threshold:", adminThreshold);
        } else {
            console.log("Keine gültige Zahl!");
        }
    }

    function setRoadThreshold(newThreshold) {
        if (!isNaN(newThreshold) && newThreshold.trim() !== "") {
            roadThreshold = Number(newThreshold);
            console.log("Threshold:", roadThreshold);
        } else {
            console.log("Keine gültige Zahl!");
        }
    }

    function updateAdminLevel() {
        const index = Number(slider.value);
        const entry = adminLevels[index];

        currentAdminLevel = entry.level;
        adminLabel.textContent = `${entry.name} (admin_level=${entry.level})`;
    }

    updateAdminLevel();
  </script>

</body>
</html>
